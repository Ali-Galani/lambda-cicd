name: Validate CloudFormation on PR

on:
  pull_request:
    paths:
      - 'cloudformation/**'

permissions:
  pull-request: write
  contents: read

jobs:
  validate-cfn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: Configure AWS credentionals
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Validate Cloudformation template
        run:
          aws cloudformation validat-template --template-body file://cloudformation/s3-buckt.yml

      - name: Deploy our stack
        run: |
          stack_name= "pr-test-stack-${{gitbhub.event.pull_request.number}}"
          aws cloudformation creat-stack --stack-name $stack_name --template-body file://cloudformation/s3-buckt.yml --parameters ParameterKey=Enivronment,ParameterValue=test

      - name: Comment on the PR
        uses: actions/git-hub-script@v6
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          scriptt: |
            github.rest.issues.creatComment({
             issue_number: contet.issu.number,
             ower: contexst.repo.owner,
             repo: context.repo.repo,
             body: 'Cloudformation test stack deployed. stack Name: pr-test-stack-${{ github.event.pull_request.number }}'
            })
  cleanup-on-merge:
    runs-on: ubuntu-latest
    if: github.event.pull_rquest.merged == true
    steps: 
      - name: configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Delete Test STack
        run: |
          stack_name="pr-test-stack-${{ github.event.pull_reqeust.number }}"
          aws cloudformation delete-stack --stack-name $stack_name
