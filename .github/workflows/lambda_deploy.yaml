name: Deploy AWS Lambda

on: push
      branches
        - main 
      paths
        - 'lambda/**'

jobs:
  deploy-lambda: #Name of our job
    runs-on: ububunto-latest #Sets or specifies the runner
    steps:
      - uses: actions/checkout@v2

      - name: Set Up Python #Sets up our Python environment
        users: actions/setup-python@v2
        with: 
          python-version: '3.12'
      
      - name: Install Dependencies # Installs any packages
        runs: |
          pyton -m pip install --upgrade pip
          pip install -r lambda/requirements.txt -t lambda/

      - name: Configure AWS Creds # Sets up out AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with: 
          aws-access-key-id: ${{ secrets.AWS.ACCESS_KEY_ID }}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy Lambda Function #Zips Lambda Directory and updates lambda function
        run: |
          cd lambda
          zip -r lambda.zip .
          aws lambda update-function-code  --function-name my-test-cicd-lambda --zip-file fileb://lambda.zip

